{% extends "base.html" %}
{% block title %}Reading: {{ book.title }}{% endblock %}

{% block content %}

<!-- ── Top bar ── -->
<div class="nr-topbar">
    <a href="{{ url_for('book_detail', book_id=book.id) }}" class="nr-back">← Back</a>
    <div class="nr-book-info">
        <span class="nr-title">{{ book.title }}</span>
        <span class="nr-author">{{ book.author }}</span>
    </div>
    <button class="nr-settings-btn" onclick="toggleSettings()">⚙ Settings</button>
</div>

<!-- ── Settings panel ── -->
<div class="nr-settings-panel" id="settings-panel">
    <div class="nr-setting-row">
        <span>Text Size</span>
        <div class="nr-btn-group">
            <button onclick="changeFontSize(-2)">A−</button>
            <span id="font-size-label">18px</span>
            <button onclick="changeFontSize(2)">A+</button>
        </div>
    </div>
    <div class="nr-setting-row">
        <span>Theme</span>
        <div class="nr-btn-group">
            <button onclick="setTheme('light')" class="theme-btn theme-light">Light</button>
            <button onclick="setTheme('sepia')" class="theme-btn theme-sepia">Sepia</button>
            <button onclick="setTheme('dark')"  class="theme-btn theme-dark">Dark</button>
        </div>
    </div>
    <div class="nr-setting-row">
        <span>Line Spacing</span>
        <div class="nr-btn-group">
            <button onclick="changeSpacing(-0.2)">−</button>
            <span id="spacing-label">1.8</span>
            <button onclick="changeSpacing(0.2)">+</button>
        </div>
    </div>
</div>

<!-- ── Progress bar ── -->
<div class="nr-progress-track">
    <div class="nr-progress-fill" id="progress-fill"></div>
</div>
<div class="nr-progress-label" id="progress-label">Chapter 1</div>

<!-- ── Chapter navigation ── -->
<div class="nr-chapter-nav">
    <button id="btn-prev-ch" class="nr-ch-btn" onclick="changeChapter(-1)" disabled>← Previous Chapter</button>
    <select id="chapter-select" class="nr-ch-select" onchange="jumpToChapter(this.value)">
        {% for ch in chapters %}
        <option value="{{ loop.index0 }}" {% if loop.index0 == current_chapter %}selected{% endif %}>
            {{ ch.title }}
        </option>
        {% endfor %}
    </select>
    <button id="btn-next-ch" class="nr-ch-btn" onclick="changeChapter(1)">Next Chapter →</button>
</div>

<!-- ── Main reading area ── -->
<div class="nr-reader nr-theme-light" id="nr-reader">
    <div class="nr-content" id="nr-content">
        <div class="nr-loading">Loading chapter...</div>
    </div>
</div>

<!-- Hidden data -->
<div id="book-data"
     data-book-id="{{ book_id }}"
     data-chapter="{{ current_chapter }}"
     data-total="{{ chapters | length }}"
     data-scroll="{{ saved_scroll }}"
     style="display:none"></div>

<script>
const bookData      = document.getElementById('book-data');
const BOOK_ID       = parseInt(bookData.dataset.bookId);
const TOTAL_CHAPTERS = parseInt(bookData.dataset.total);
const SAVED_SCROLL  = parseFloat(bookData.dataset.scroll) || 0;

let currentChapter  = parseInt(bookData.dataset.chapter) || 0;
let fontSize        = 18;
let lineSpacing     = 1.8;
let theme           = 'light';
let saveTimer       = null;

const reader   = document.getElementById('nr-reader');
const content  = document.getElementById('nr-content');
const progFill = document.getElementById('progress-fill');
const progLabel= document.getElementById('progress-label');
const selectEl = document.getElementById('chapter-select');
const btnPrev  = document.getElementById('btn-prev-ch');
const btnNext  = document.getElementById('btn-next-ch');

// ── Load a chapter from the server ──
function loadChapter(index, scrollPos) {
    scrollPos = scrollPos || 0;
    content.innerHTML = '<div class="nr-loading">Loading...</div>';
    reader.scrollTop  = 0;

    // Fetch chapter HTML from Flask
    fetch('/chapter/' + BOOK_ID + '/' + index)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) {
                content.innerHTML = '<p style="color:#d45f5f;padding:2rem;">' + data.error + '</p>';
                return;
            }

            // Inject the chapter HTML directly — EPUB already has proper formatting
            content.innerHTML = '<h2 class="nr-chapter-heading">' + data.title + '</h2>' + data.html;

            currentChapter = index;
            selectEl.value = index;

            // Update progress bar (which chapter out of total)
            const pct = Math.round(((index + 1) / TOTAL_CHAPTERS) * 100);
            progFill.style.width  = pct + '%';
            progLabel.textContent = 'Chapter ' + (index + 1) + ' of ' + TOTAL_CHAPTERS;

            // Enable/disable prev/next buttons
            btnPrev.disabled = (index <= 0);
            btnNext.disabled = (index >= TOTAL_CHAPTERS - 1);

            // Restore scroll position if provided
            if (scrollPos > 0) {
                setTimeout(function() {
                    reader.scrollTop = scrollPos * reader.scrollHeight;
                }, 100);
            }

            applyPrefs();
        })
        .catch(function() {
            content.innerHTML = '<p style="color:#d45f5f;padding:2rem;">Could not load chapter.</p>';
        });
}

function changeChapter(delta) {
    const next = currentChapter + delta;
    if (next >= 0 && next < TOTAL_CHAPTERS) {
        loadChapter(next, 0);
        savePosition(next, 0);
    }
}

function jumpToChapter(index) {
    loadChapter(parseInt(index), 0);
    savePosition(parseInt(index), 0);
}

// ── Track scroll and save position ──
reader.addEventListener('scroll', function() {
    const scrolled = reader.scrollTop;
    const total    = reader.scrollHeight - reader.clientHeight;
    const pos      = total > 0 ? scrolled / total : 0;

    clearTimeout(saveTimer);
    saveTimer = setTimeout(function() {
        savePosition(currentChapter, pos);
    }, 2000);
});

function savePosition(chapter, scrollPos) {
    // We encode both chapter and scroll as a single number: chapter.scrollpct
    // e.g. chapter 3, 45% scrolled = 3.45
    const encoded = chapter + (scrollPos * 0.9999);
    fetch('/save-page', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ book_id: BOOK_ID, page: encoded })
    });
}

// ── Settings ──
function toggleSettings() {
    document.getElementById('settings-panel').classList.toggle('nr-settings-open');
}

function applyPrefs() {
    content.style.fontSize  = fontSize + 'px';
    content.style.lineHeight = lineSpacing;
}

function changeFontSize(delta) {
    fontSize = Math.min(28, Math.max(12, fontSize + delta));
    document.getElementById('font-size-label').textContent = fontSize + 'px';
    applyPrefs();
    savePrefs();
}

function changeSpacing(delta) {
    lineSpacing = Math.min(3.0, Math.max(1.2, Math.round((lineSpacing + delta) * 10) / 10));
    document.getElementById('spacing-label').textContent = lineSpacing.toFixed(1);
    applyPrefs();
    savePrefs();
}

function setTheme(t) {
    theme = t;
    reader.className = 'nr-reader nr-theme-' + t;
    savePrefs();
}

function savePrefs() {
    try { localStorage.setItem('nr-prefs', JSON.stringify({ fontSize, lineSpacing, theme })); } catch(e) {}
}

function loadPrefs() {
    try {
        const p = JSON.parse(localStorage.getItem('nr-prefs') || '{}');
        if (p.fontSize)    { fontSize    = p.fontSize; }
        if (p.lineSpacing) { lineSpacing = p.lineSpacing; }
        if (p.theme)       { theme       = p.theme; }
        document.getElementById('font-size-label').textContent = fontSize + 'px';
        document.getElementById('spacing-label').textContent   = lineSpacing.toFixed(1);
        setTheme(theme);
    } catch(e) {}
}

// ── Start ──
loadPrefs();

// Decode saved position: integer part = chapter, decimal = scroll
const savedChapter = Math.floor(SAVED_SCROLL);
const savedScroll  = (SAVED_SCROLL - savedChapter) / 0.9999;
loadChapter(savedChapter, savedChapter === currentChapter ? savedScroll : 0);
</script>
{% endblock %}
