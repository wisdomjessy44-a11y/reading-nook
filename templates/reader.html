{% extends "base.html" %}
{% block title %}Reading: {{ book.title }}{% endblock %}

{% block content %}
<div class="reader-header">
    <a href="{{ url_for('book_detail', book_id=book.id) }}" class="back-link">← Back</a>
    <div class="reader-title-wrap">
        <h2 class="reader-title">{{ book.title }}</h2>
        <span class="reader-author">{{ book.author }}</span>
    </div>
    <div class="reader-page-info">
        Page <span id="current-page-display">{{ last_page }}</span>
        of <span id="total-pages-display">…</span>
    </div>
</div>

<!-- ── Toolbar: zoom + fullscreen ── -->
<div class="reader-toolbar">
    <div class="toolbar-group">
        <button id="btn-zoom-out" class="tool-btn" title="Zoom out">−</button>
        <span id="zoom-label" class="zoom-label">100%</span>
        <button id="btn-zoom-in"  class="tool-btn" title="Zoom in">+</button>
        <button id="btn-zoom-fit" class="tool-btn" title="Fit to screen">⊡ Fit</button>
    </div>
    <div class="toolbar-group">
        <button id="btn-fullscreen" class="tool-btn" title="Full screen">⛶ Full Screen</button>
    </div>
</div>

<!-- ── PDF Viewer ── -->
<div class="reader-wrap" id="reader-wrap">

    <!-- Scrollable canvas area -->
    <div class="canvas-scroll-area" id="canvas-scroll-area">
        <canvas id="pdf-canvas"></canvas>
    </div>

    <!-- Navigation controls -->
    <div class="reader-controls">
        <button id="btn-prev" class="btn btn-secondary" disabled>← Prev</button>

        <div class="page-jump">
            <input type="number" id="page-input" min="1" value="{{ last_page }}"
                   title="Jump to page">
            <button id="btn-go" class="btn btn-secondary">Go</button>
        </div>

        <button id="btn-next" class="btn btn-primary">Next →</button>
    </div>

    <!-- Progress bar -->
    <div class="reader-progress-wrap">
        <div class="reader-progress-bar" id="reader-progress-bar"></div>
    </div>
    <p class="reader-progress-label" id="reader-progress-label"></p>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
// ── Config ──
const PDF_URL    = "{{ pdf_url }}";
const BOOK_ID    = {{ book_id }};
const START_PAGE = {{ last_page }};

pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

// ── State ──
let pdfDoc      = null;
let currentPage = START_PAGE;
let totalPages  = 0;
let isRendering = false;
let currentScale = null;   // null = auto-fit on first load

// ── Elements ──
const canvas         = document.getElementById("pdf-canvas");
const ctx            = canvas.getContext("2d");
const btnPrev        = document.getElementById("btn-prev");
const btnNext        = document.getElementById("btn-next");
const btnGo          = document.getElementById("btn-go");
const pageInput      = document.getElementById("page-input");
const currentDisplay = document.getElementById("current-page-display");
const totalDisplay   = document.getElementById("total-pages-display");
const progressBar    = document.getElementById("reader-progress-bar");
const progressLabel  = document.getElementById("reader-progress-label");
const zoomLabel      = document.getElementById("zoom-label");
const scrollArea     = document.getElementById("canvas-scroll-area");

// ── Render a page at current scale ──
function renderPage(pageNum) {
    if (isRendering) return;
    isRendering = true;

    pdfDoc.getPage(pageNum).then(function(page) {
        // If no scale set yet, auto-fit to container width
        if (currentScale === null) {
            const containerWidth = scrollArea.clientWidth - 40;
            const baseViewport   = page.getViewport({ scale: 1 });
            currentScale = containerWidth / baseViewport.width;
            // Don't go below 1.2 so text is always readable
            currentScale = Math.max(currentScale, 1.2);
        }

        const viewport = page.getViewport({ scale: currentScale });
        canvas.width   = viewport.width;
        canvas.height  = viewport.height;

        page.render({ canvasContext: ctx, viewport: viewport }).promise.then(function() {
            isRendering = false;

            // Update UI
            currentPage = pageNum;
            currentDisplay.textContent = pageNum;
            pageInput.value            = pageNum;
            zoomLabel.textContent      = Math.round(currentScale * 100) + "%";

            // Progress
            const pct = Math.round((pageNum / totalPages) * 100);
            progressBar.style.width   = pct + "%";
            progressLabel.textContent = pct + "% through the book";

            btnPrev.disabled = (pageNum <= 1);
            btnNext.disabled = (pageNum >= totalPages);

            // Scroll back to top of page on page turn
            scrollArea.scrollTop = 0;

            // Auto-save progress
            fetch("/save-page", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ book_id: BOOK_ID, page: pageNum })
            });
        });
    });
}

// ── Load PDF ──
pdfjsLib.getDocument(PDF_URL).promise.then(function(pdf) {
    pdfDoc     = pdf;
    totalPages = pdf.numPages;
    totalDisplay.textContent = totalPages;
    pageInput.max = totalPages;
    const startPage = Math.min(Math.max(1, START_PAGE), totalPages);
    renderPage(startPage);
}).catch(function(err) {
    scrollArea.innerHTML =
        '<p style="padding:2rem;color:#d45f5f;">❌ Could not load PDF. Please re-upload the file.</p>';
});

// ── Zoom controls ──
const ZOOM_STEP = 0.2;
const ZOOM_MIN  = 0.5;
const ZOOM_MAX  = 4.0;

document.getElementById("btn-zoom-in").addEventListener("click", function() {
    if (currentScale < ZOOM_MAX) {
        currentScale = Math.min(currentScale + ZOOM_STEP, ZOOM_MAX);
        renderPage(currentPage);
    }
});

document.getElementById("btn-zoom-out").addEventListener("click", function() {
    if (currentScale > ZOOM_MIN) {
        currentScale = Math.max(currentScale - ZOOM_STEP, ZOOM_MIN);
        renderPage(currentPage);
    }
});

// Fit to screen width
document.getElementById("btn-zoom-fit").addEventListener("click", function() {
    currentScale = null;   // Reset — renderPage will auto-fit
    renderPage(currentPage);
});

// ── Full screen ──
const readerWrap = document.getElementById("reader-wrap");
document.getElementById("btn-fullscreen").addEventListener("click", function() {
    if (!document.fullscreenElement) {
        readerWrap.requestFullscreen().catch(function(err) {
            alert("Full screen not supported on this browser.");
        });
        this.textContent = "✕ Exit Full Screen";
    } else {
        document.exitFullscreen();
        this.textContent = "⛶ Full Screen";
    }
});

document.addEventListener("fullscreenchange", function() {
    const btn = document.getElementById("btn-fullscreen");
    if (!document.fullscreenElement) {
        btn.textContent = "⛶ Full Screen";
        // Re-fit after exiting fullscreen
        currentScale = null;
        renderPage(currentPage);
    } else {
        // Fit to full screen width
        currentScale = null;
        renderPage(currentPage);
    }
});

// ── Navigation ──
btnPrev.addEventListener("click", function() {
    if (currentPage > 1) renderPage(currentPage - 1);
});

btnNext.addEventListener("click", function() {
    if (currentPage < totalPages) renderPage(currentPage + 1);
});

btnGo.addEventListener("click", function() {
    const target = parseInt(pageInput.value);
    if (target >= 1 && target <= totalPages) renderPage(target);
});

pageInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") btnGo.click();
});

// ── Keyboard shortcuts ──
document.addEventListener("keydown", function(e) {
    if (e.target === pageInput) return;
    if (e.key === "ArrowRight" || e.key === "ArrowDown") btnNext.click();
    if (e.key === "ArrowLeft"  || e.key === "ArrowUp")   btnPrev.click();
    if (e.key === "+" || e.key === "=") document.getElementById("btn-zoom-in").click();
    if (e.key === "-") document.getElementById("btn-zoom-out").click();
    if (e.key === "f" || e.key === "F") document.getElementById("btn-fullscreen").click();
});
</script>
{% endblock %}
