<!-- templates/login.html -->
<!-- 'extends' means: use base.html as the wrapper, fill in 'content' block below -->
{% extends "base.html" %}

{% block title %}Login — Reading Nook{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">

        <div class="login-header">
            <div class="login-icon">📖</div>
            <h1>Reading Nook</h1>
            <p class="login-subtitle">Your private reading space</p>
        </div>

        <!--
            action="" means: POST to the same URL (/login).
            method="post" means: send form data securely in the request body.
        -->
        <form action="" method="post" class="login-form">

            <div class="form-group">
                <label for="username">Who are you?</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter your name..."
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password..."
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="btn btn-primary btn-full">
                Enter the Nook →
            </button>

        </form>

        <p class="login-hint">
            💡 Default logins: <strong>Me</strong> / password1 &nbsp;|&nbsp; <strong>Sister</strong> / password2
            <br><small>(Change these in database.py after first run!)</small>
        </p>

    </div>
</div>
{% endblock %}
